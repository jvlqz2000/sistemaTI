<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Dashboard</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>

        <div class="d-flex">

            <!-- SIDEBAR -->
            <div class="sidebar p-3">
                <h4>Sistema TI</h4>

                <button onclick="show('dashboard')" class="btn btn-light w-100 mt-3">Dashboard</button>
                <button onclick="show('tickets')" class="btn btn-light w-100 mt-2">Tickets</button>
                <button onclick="show('inventario')" class="btn btn-light w-100 mt-2">Inventario</button>
            </div>

            <!-- CONTENIDO -->
            <div class="content p-4 w-100">

                <!-- DASHBOARD -->
                <div id="dashboardView">
                    <h2>Resumen</h2>

                    <div class="row">
                        <div class="col-md-4">
                            <div class="card p-3 shadow">
                                <h5>Tickets Abiertos</h5>
                                <h2 id="abiertos">0</h2>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card p-3 shadow">
                                <h5>En Proceso</h5>
                                <h2 id="proceso">0</h2>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="card p-3 shadow">
                                <h5>Cerrados</h5>
                                <h2 id="cerrados">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TICKETS -->
                <div id="ticketsView" style="display:none;">
                    <h2>Tickets</h2>

                    <select id="filtro" class="form-select mb-3" onchange="cargarTickets()">
                        <option value="">Todos</option>
                        <option value="ABIERTO">Abiertos</option>
                        <option value="EN_PROCESO">En proceso</option>
                        <option value="CERRADO">Cerrados</option>
                    </select>

                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Estado</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaTickets"></tbody>
                    </table>
                </div>

                <!-- INVENTARIO -->
                <div id="inventarioView" style="display:none;">
                    <h2>Inventario</h2>
                    <table class="table table-bordered">
                        <tbody id="tablaEquipos"></tbody>
                    </table>
                </div>

            </div>
        </div>

        <script src="js/dashboard.js"></script>
        <script src="js/tickets.js"></script>
        <script src="js/inventario.js"></script>

    </body>
</html>
